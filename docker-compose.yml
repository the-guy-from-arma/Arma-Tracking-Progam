services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: forgeops
      POSTGRES_PASSWORD: forgeops
      POSTGRES_DB: forgeops
    volumes:
      - forgeops_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U forgeops"]
      interval: 5s
      timeout: 5s
      retries: 10
  web:
    build: .
    ports: ["3000:3000"]
    environment:
      DATABASE_URL: postgresql://forgeops:forgeops@db:5432/forgeops
      OWNER_EMAIL: owner@example.com
      OWNER_PASSWORD: local-owner-password
      OWNER_NAME: Project VALORIS Owner
    depends_on:
      db:
        condition: service_healthy
volumes:
  forgeops_data:
